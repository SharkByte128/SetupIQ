services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: setupiq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-setupiq}
      POSTGRES_DB: setupiq
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setupiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://setupiq:${POSTGRES_PASSWORD:-setupiq}@postgres:5432/setupiq
      PORT: "3001"
      HOST: "0.0.0.0"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:5173}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      OLLAMA_URL: "${OLLAMA_URL:-}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      MICROSOFT_CLIENT_ID: "${MICROSOFT_CLIENT_ID:-}"
      MICROSOFT_CLIENT_SECRET: "${MICROSOFT_CLIENT_SECRET:-}"
    ports:
      - "${API_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
