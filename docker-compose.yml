services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: setupiq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-setupiq}
      POSTGRES_DB: setupiq
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U setupiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://setupiq:${POSTGRES_PASSWORD:-setupiq}@postgres:5432/setupiq
      PORT: "3001"
      HOST: "0.0.0.0"
      CORS_ORIGIN: "${CORS_ORIGIN:-https://dev.setupiq.app}"
      JWT_SECRET: "${JWT_SECRET:-change-me-in-production}"
      OLLAMA_URL: "${OLLAMA_URL:-}"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      MICROSOFT_CLIENT_ID: "${MICROSOFT_CLIENT_ID:-}"
      MICROSOFT_CLIENT_SECRET: "${MICROSOFT_CLIENT_SECRET:-}"
      DOCS_ROOT: "/app/docs"
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: "${VITE_API_URL:-}"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      SITE_DOMAIN: "${SITE_DOMAIN:-dev.setupiq.app}"
      CLOUDFLARE_API_TOKEN: "${CLOUDFLARE_API_TOKEN:-}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
