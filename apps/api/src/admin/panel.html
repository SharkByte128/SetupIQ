<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SetupIQ Admin</title>
<style>
  :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #3b82f6; --danger: #ef4444; --success: #22c55e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .container { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
  h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
  h2 { font-size: 1.2rem; margin-bottom: 1rem; color: var(--muted); }
  button { cursor: pointer; border: none; border-radius: 6px; padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500; transition: opacity 0.15s; }
  button:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  input { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.875rem; width: 100%; }
  input:focus { outline: none; border-color: var(--accent); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
  .row { display: flex; gap: 0.75rem; align-items: center; }
  .row-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .token { font-family: monospace; font-size: 0.75rem; color: var(--muted); word-break: break-all; background: var(--bg); padding: 0.3rem 0.5rem; border-radius: 4px; }
  .badge { display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 9999px; background: var(--accent); color: #fff; margin-left: 0.5rem; }
  .driver-list { margin-top: 0.75rem; padding-left: 1rem; }
  .driver-item { display: flex; justify-content: space-between; align-items: center; padding: 0.3rem 0; border-bottom: 1px solid var(--border); }
  .driver-item:last-child { border-bottom: none; }
  .hidden { display: none; }
  .error { color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; }
  .success { color: var(--success); font-size: 0.85rem; margin-top: 0.5rem; }
  .login-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .login-card { width: 100%; max-width: 380px; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.3rem; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
  .user-card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .user-info h3 { font-size: 1rem; }
  .user-info .username { color: var(--muted); font-size: 0.85rem; }
  .actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
  .copy-btn { cursor: pointer; color: var(--accent); font-size: 0.75rem; margin-left: 0.5rem; }
  .copy-btn:hover { text-decoration: underline; }
  .add-driver-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
  .add-driver-row input { flex: 1; }
  /* Tabs */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
  .tab { padding: 0.6rem 1.2rem; cursor: pointer; color: var(--muted); font-size: 0.9rem; border-bottom: 2px solid transparent; transition: all 0.15s; background: none; border-radius: 0; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  /* Table */
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); }
  td { padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.4rem 0.5rem; font-size: 0.8rem; }
  select:focus { outline: none; border-color: var(--accent); }
  .badge-pending { background: #f59e0b; }
  .badge-linked { background: var(--success); }
  .badge-rejected { background: var(--danger); }
  .badge-new { background: var(--accent); }
  .offers-img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 0.4rem; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  textarea { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.5rem 0.75rem; font-size: 0.85rem; width: 100%; resize: vertical; font-family: inherit; }
  textarea:focus { outline: none; border-color: var(--accent); }
  /* Rich editor */
  .rich-toolbar { display: flex; gap: 0.25rem; padding: 0.3rem; background: var(--surface); border: 1px solid var(--border); border-bottom: none; border-radius: 6px 6px 0 0; flex-wrap: wrap; }
  .rich-toolbar button { background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 0.2rem 0.5rem; font-size: 0.75rem; border-radius: 3px; min-width: 28px; }
  .rich-toolbar button:hover { background: var(--border); }
  .rich-body { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 0 0 6px 6px; padding: 0.75rem; min-height: 120px; max-height: 400px; overflow-y: auto; font-size: 0.85rem; line-height: 1.5; }
  .rich-body:focus { outline: none; border-color: var(--accent); }
  .rich-body img { max-width: 100%; border-radius: 4px; margin: 0.5rem 0; }
  .rich-body h3, .rich-body h4 { margin: 0.5rem 0 0.25rem; }
  .rich-body ul, .rich-body ol { margin: 0.25rem 0; padding-left: 1.5rem; }
  /* Expandable rows */
  .part-row { cursor: pointer; }
  .part-row:hover td { background: rgba(59,130,246,0.05); }
  .part-expand { display: none; }
  .part-expand.open { display: table-row; }
  .part-expand td { padding: 1rem; background: var(--surface); }
  .edit-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
  .edit-grid .full { grid-column: 1 / -1; }
  .dirty-indicator { color: var(--accent); font-weight: bold; }
  .save-bar { position: sticky; bottom: 0; background: var(--bg); border-top: 1px solid var(--border); padding: 0.75rem; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
  .save-bar.hidden { display: none; }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-wrapper">
  <div class="card login-card">
    <h1>SetupIQ Admin</h1>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="login-user" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-token" autocomplete="current-password">
    </div>
    <button class="btn-primary" style="width:100%" onclick="doLogin()">Sign In</button>
    <div id="login-error" class="error hidden"></div>
  </div>
</div>

<!-- Admin Panel -->
<div id="admin-screen" class="hidden">
  <div class="container">
    <div class="header">
      <h1>SetupIQ Admin</h1>
      <button class="btn-ghost" onclick="doLogout()">Sign Out</button>
    </div>

    <!-- Tab Navigation -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('users')">Users</button>
      <button class="tab" onclick="switchTab('sources')">Vendor Sources</button>
      <button class="tab" onclick="switchTab('offers')">Vendor Offers</button>
      <button class="tab" onclick="switchTab('parts')">Catalog Parts</button>
    </div>

    <!-- ═══ Users Tab ═══ -->
    <div class="tab-content active" id="tab-users">

    <!-- Create User -->
    <div class="card">
      <h2>Create User</h2>
      <div class="row">
        <input type="text" id="new-username" placeholder="Username (min 2 chars)">
        <input type="text" id="new-display" placeholder="Display Name (optional)">
        <button class="btn-primary" onclick="createUser()">Create</button>
      </div>
      <div id="create-msg"></div>
    </div>

    <!-- Users List -->
    <div class="row-between">
      <h2 style="margin-bottom:0">Users</h2>
      <button class="btn-ghost btn-sm" onclick="loadUsers()">Refresh</button>
    </div>
    <div id="users-list"></div>

    </div><!-- /tab-users -->

    <!-- ═══ Vendor Sources Tab ═══ -->
    <div class="tab-content" id="tab-sources">
      <div class="card">
        <h2>Add Vendor Source</h2>
        <div class="row" style="flex-wrap:wrap">
          <input type="text" id="src-name" placeholder="Name (e.g. Silver Horse RC)" style="flex:1;min-width:150px">
          <select id="src-type" style="width:auto"><option value="shopify">Shopify</option><option value="woocommerce">WooCommerce</option></select>
          <input type="text" id="src-url" placeholder="Base URL (e.g. https://silverhorserc.com)" style="flex:2;min-width:200px">
          <button class="btn-primary" onclick="createSource()">Add</button>
        </div>
        <div id="source-msg"></div>
      </div>
      <div class="row-between">
        <h2 style="margin-bottom:0">Sources</h2>
        <button class="btn-ghost btn-sm" onclick="loadSources()">Refresh</button>
      </div>
      <div id="sources-list"></div>
    </div>

    <!-- ═══ Vendor Offers Tab ═══ -->
    <div class="tab-content" id="tab-offers">
      <div class="card">
        <div class="row" style="flex-wrap:wrap">
          <input type="text" id="offers-search" placeholder="Search products, SKUs, tags..." style="flex:1;min-width:200px" oninput="filterOffers()">
          <select id="offers-source-filter" style="width:auto;min-width:150px"><option value="">All Sources</option></select>
          <select id="offers-status-filter" style="width:auto"><option value="">All Statuses</option><option value="pending">Pending</option><option value="linked">Linked</option><option value="rejected">Rejected</option></select>
          <button class="btn-primary" onclick="loadOffers()">Load</button>
        </div>
      </div>
      <div id="offers-list"></div>
    </div>

    <!-- ═══ Catalog Parts Tab ═══ -->
    <div class="tab-content" id="tab-parts">
      <div class="card">
        <h2>Create Catalog Part</h2>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem">
          <input type="text" id="cp-name" placeholder="Part Name *">
          <input type="text" id="cp-brand" placeholder="Brand">
          <select id="cp-category"><option value="">Category *</option><option value="chassis">Chassis</option><option value="suspension">Suspension</option><option value="tires">Tires</option><option value="wheels">Wheels</option><option value="electronics">Electronics</option><option value="servo">Servo</option><option value="esc">ESC</option><option value="receiver">Receiver</option><option value="drivetrain">Drivetrain</option><option value="body">Body</option><option value="other">Other</option></select>
          <input type="text" id="cp-sku" placeholder="Base SKU * (unique)">
          <input type="text" id="cp-image" placeholder="Image URL" style="grid-column:1/-1">
          <input type="text" id="cp-pdf" placeholder="Instructions PDF URL" style="grid-column:1/-1">
          <input type="text" id="cp-setup-text" placeholder="Setup display text (shown on setup page)" style="grid-column:1/-1">
          <div style="grid-column:1/-1">
            <label style="font-size:0.8rem;color:var(--muted);margin-bottom:0.25rem;display:block">Description (rich text)</label>
            <div class="rich-toolbar">
              <button type="button" onclick="richCmd('bold')" title="Bold"><b>B</b></button>
              <button type="button" onclick="richCmd('italic')" title="Italic"><i>I</i></button>
              <button type="button" onclick="richCmd('underline')" title="Underline"><u>U</u></button>
              <button type="button" onclick="richCmd('insertUnorderedList')" title="Bullet list">• List</button>
              <button type="button" onclick="richCmd('insertOrderedList')" title="Numbered list">1. List</button>
              <button type="button" onclick="richInsertHeading('cp-desc')" title="Heading">H3</button>
              <button type="button" onclick="richInsertImage('cp-desc')" title="Insert image">🖼 Image</button>
              <button type="button" onclick="richInsertLink()" title="Insert link">🔗 Link</button>
            </div>
            <div class="rich-body" contenteditable="true" id="cp-desc"></div>
          </div>
          <input type="text" id="cp-tags" placeholder="Tags (comma-separated)" style="grid-column:1/-1">
        </div>
        <div style="margin-top:0.75rem">
          <button class="btn-primary" onclick="createCatalogPart()">Create Part</button>
        </div>
        <div id="cp-msg"></div>
      </div>
      <div class="row-between">
        <h2 style="margin-bottom:0">Catalog Parts</h2>
        <div class="row" style="gap:0.5rem">
          <input type="text" id="parts-search" placeholder="Search parts..." oninput="filterCatalogParts()" style="width:220px">
          <button class="btn-ghost btn-sm" onclick="loadCatalogParts()">Refresh</button>
        </div>
      </div>
      <div id="catalog-parts-list"></div>
      <div id="parts-save-bar" class="save-bar hidden">
        <span id="parts-dirty-count" style="font-size:0.85rem"></span>
        <div class="row" style="gap:0.5rem">
          <button class="btn-ghost btn-sm" onclick="discardPartChanges()">Discard</button>
          <button class="btn-primary" onclick="saveAllDirtyParts()">💾 Save All Changes</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
let AUTH_TOKEN = localStorage.getItem('setupiq_admin_token') || '';
const API = window.location.origin;

// ─── Auth ──────────────────────────────────────────────────

async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const apiToken = document.getElementById('login-token').value.trim();
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');

  try {
    const res = await fetch(`${API}/admin/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, apiToken }),
    });
    if (!res.ok) {
      const d = await res.json();
      throw new Error(d.error || 'Login failed');
    }
    const data = await res.json();
    AUTH_TOKEN = data.token;
    localStorage.setItem('setupiq_admin_token', AUTH_TOKEN);
    showAdmin();
  } catch (e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

function doLogout() {
  AUTH_TOKEN = '';
  localStorage.removeItem('setupiq_admin_token');
  document.getElementById('admin-screen').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

function authHeaders() {
  return { 'Authorization': `Bearer ${AUTH_TOKEN}`, 'Content-Type': 'application/json' };
}

async function apiFetch(path, opts = {}) {
  const res = await fetch(`${API}${path}`, { ...opts, headers: { ...authHeaders(), ...(opts.headers || {}) } });
  if (res.status === 401) { doLogout(); throw new Error('Session expired'); }
  return res;
}

// ─── Admin Panel ───────────────────────────────────────────

async function showAdmin() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('admin-screen').classList.remove('hidden');
  await loadUsers();
}

async function loadUsers() {
  try {
    const res = await apiFetch('/admin/api/users');
    const usersList = await res.json();
    renderUsers(usersList);
  } catch (e) {
    document.getElementById('users-list').innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

function renderUsers(usersList) {
  const container = document.getElementById('users-list');
  if (!usersList.length) {
    container.innerHTML = '<div class="card"><p style="color:var(--muted)">No users yet. Create one above.</p></div>';
    return;
  }

  container.innerHTML = usersList.map(u => `
    <div class="card" id="user-${u.id}">
      <div class="user-card-header">
        <div class="user-info">
          <h3>${esc(u.displayName || u.username || 'Unknown')}</h3>
          <div class="username">@${esc(u.username || '—')}</div>
        </div>
        <div class="actions">
          <button class="btn-ghost btn-sm" onclick="regenerateToken('${u.id}')">New Token</button>
          <button class="btn-danger btn-sm" onclick="deleteUser('${u.id}', '${esc(u.username || '')}')">Delete</button>
        </div>
      </div>
      ${u.apiToken ? `<div style="margin-top:0.5rem"><span class="token" id="token-${u.id}">${esc(u.apiToken)}</span><span class="copy-btn" onclick="copyToken('${u.id}')">copy</span></div>` : ''}
      <div class="driver-list" id="drivers-${u.id}">
        <em style="color:var(--muted);font-size:0.8rem">Loading drivers...</em>
      </div>
      <div class="add-driver-row">
        <input type="text" id="driver-name-${u.id}" placeholder="New driver name">
        <button class="btn-primary btn-sm" onclick="addDriver('${u.id}')">Add Driver</button>
      </div>
    </div>
  `).join('');

  // Load drivers for each user
  usersList.forEach(u => loadDrivers(u.id));
}

async function loadDrivers(userId) {
  try {
    const res = await apiFetch(`/admin/api/users/${userId}/drivers`);
    const driversList = await res.json();
    const container = document.getElementById(`drivers-${userId}`);
    if (!driversList.length) {
      container.innerHTML = '<em style="color:var(--muted);font-size:0.8rem">No drivers</em>';
      return;
    }
    container.innerHTML = driversList.map(d => `
      <div class="driver-item">
        <span>${esc(d.name)}</span>
        <button class="btn-danger btn-sm" onclick="deleteDriver('${d.id}', '${userId}')">×</button>
      </div>
    `).join('');
  } catch {
    // ignore
  }
}

// ─── Actions ───────────────────────────────────────────────

async function createUser() {
  const username = document.getElementById('new-username').value.trim();
  const displayName = document.getElementById('new-display').value.trim();
  const msgEl = document.getElementById('create-msg');

  try {
    const res = await apiFetch('/admin/api/users', {
      method: 'POST',
      body: JSON.stringify({ username, displayName: displayName || undefined }),
    });
    if (!res.ok) {
      const d = await res.json();
      throw new Error(d.message || d.error || 'Failed');
    }
    document.getElementById('new-username').value = '';
    document.getElementById('new-display').value = '';
    msgEl.innerHTML = `<div class="success">User "${esc(username)}" created!</div>`;
    setTimeout(() => msgEl.innerHTML = '', 3000);
    await loadUsers();
  } catch (e) {
    msgEl.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

async function deleteUser(id, username) {
  if (!confirm(`Delete user @${username}? This will also delete all their drivers.`)) return;
  try {
    await apiFetch(`/admin/api/users/${id}`, { method: 'DELETE' });
    await loadUsers();
  } catch (e) {
    alert(e.message);
  }
}

async function regenerateToken(userId) {
  if (!confirm('Generate a new API token? The old token will stop working immediately.')) return;
  try {
    const res = await apiFetch(`/admin/api/users/${userId}/regenerate-token`, { method: 'POST' });
    const data = await res.json();
    const el = document.getElementById(`token-${userId}`);
    if (el) el.textContent = data.apiToken;
  } catch (e) {
    alert(e.message);
  }
}

async function addDriver(userId) {
  const input = document.getElementById(`driver-name-${userId}`);
  const name = input.value.trim();
  if (!name) return;

  try {
    const res = await apiFetch(`/admin/api/users/${userId}/drivers`, {
      method: 'POST',
      body: JSON.stringify({ name }),
    });
    if (!res.ok) {
      const d = await res.json();
      throw new Error(d.message || d.error || 'Failed');
    }
    input.value = '';
    await loadDrivers(userId);
  } catch (e) {
    alert(e.message);
  }
}

async function deleteDriver(driverId, userId) {
  if (!confirm('Remove this driver?')) return;
  try {
    await apiFetch(`/admin/api/drivers/${driverId}`, { method: 'DELETE' });
    await loadDrivers(userId);
  } catch (e) {
    alert(e.message);
  }
}

function copyToken(userId) {
  const el = document.getElementById(`token-${userId}`);
  if (el) navigator.clipboard.writeText(el.textContent);
}

// ─── Tabs ──────────────────────────────────────────────────

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.remove('active');
    if (['users','sources','offers','parts'][i] === name) t.classList.add('active');
  });
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  // Load data on tab switch
  if (name === 'sources') loadSources();
  else if (name === 'offers') { loadSourcesForFilter(); loadOffers(); }
  else if (name === 'parts') loadCatalogParts();
}

// ─── Vendor Sources ────────────────────────────────────────

let sourcesCache = [];

async function loadSources() {
  try {
    const res = await apiFetch('/api/admin/catalog/vendor-sources');
    const data = await res.json();
    sourcesCache = data.sources || [];
    renderSources(sourcesCache);
  } catch (e) {
    document.getElementById('sources-list').innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

function renderSources(sources) {
  const el = document.getElementById('sources-list');
  if (!sources.length) {
    el.innerHTML = '<div class="card"><p style="color:var(--muted)">No vendor sources yet.</p></div>';
    return;
  }
  el.innerHTML = `<table><thead><tr><th>Name</th><th>Type</th><th>URL</th><th>Enabled</th><th>Actions</th></tr></thead><tbody>` +
    sources.map(s => `<tr>
      <td><strong>${esc(s.name)}</strong></td>
      <td>${esc(s.type)}</td>
      <td style="font-size:0.8rem;word-break:break-all">${esc(s.baseUrl)}</td>
      <td>${s.enabled ? '✅' : '❌'}</td>
      <td>
        <button class="btn-primary btn-sm" id="ingest-btn-${s.id}" onclick="runIngestion('${s.id}')">
          Ingest Now
        </button>
      </td>
    </tr>`).join('') + `</tbody></table>`;
}

async function createSource() {
  const name = document.getElementById('src-name').value.trim();
  const type = document.getElementById('src-type').value;
  const baseUrl = document.getElementById('src-url').value.trim();
  const msgEl = document.getElementById('source-msg');

  if (!name || !baseUrl) { msgEl.innerHTML = '<div class="error">Name and URL required</div>'; return; }

  try {
    const res = await apiFetch('/api/admin/catalog/vendor-sources', {
      method: 'POST',
      body: JSON.stringify({ name, type, baseUrl }),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.message || d.error || 'Failed'); }
    document.getElementById('src-name').value = '';
    document.getElementById('src-url').value = '';
    msgEl.innerHTML = '<div class="success">Source created!</div>';
    setTimeout(() => msgEl.innerHTML = '', 3000);
    await loadSources();
  } catch (e) {
    msgEl.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

async function runIngestion(sourceId) {
  const btn = document.getElementById(`ingest-btn-${sourceId}`);
  const origText = btn.innerHTML;
  btn.innerHTML = '<span class="spinner"></span>Ingesting...';
  btn.disabled = true;

  try {
    const res = await apiFetch(`/api/admin/catalog/vendor-sources/${sourceId}/ingest`, { method: 'POST', body: '{}' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Ingestion failed');
    btn.innerHTML = `✅ ${data.fetched} products, ${data.upserted} offers`;
    setTimeout(() => { btn.innerHTML = origText; btn.disabled = false; }, 5000);
  } catch (e) {
    btn.innerHTML = `❌ ${esc(e.message)}`;
    setTimeout(() => { btn.innerHTML = origText; btn.disabled = false; }, 5000);
  }
}

async function loadSourcesForFilter() {
  if (!sourcesCache.length) {
    try {
      const res = await apiFetch('/api/admin/catalog/vendor-sources');
      const data = await res.json();
      sourcesCache = data.sources || [];
    } catch { /* ignore */ }
  }
  const sel = document.getElementById('offers-source-filter');
  // Keep first option, replace rest
  sel.innerHTML = '<option value="">All Sources</option>' +
    sourcesCache.map(s => `<option value="${s.id}">${esc(s.name)}</option>`).join('');
}

let allOffers = [];

async function loadOffers() {
  const sourceId = document.getElementById('offers-source-filter').value;
  const status = document.getElementById('offers-status-filter').value;
  let qs = [];
  if (sourceId) qs.push(`vendorSourceId=${sourceId}`);
  if (status) qs.push(`status=${status}`);

  try {
    const res = await apiFetch(`/api/admin/catalog/vendor-offers${qs.length ? '?' + qs.join('&') : ''}`);
    const data = await res.json();
    allOffers = data.offers || [];
    filterOffers();
  } catch (e) {
    document.getElementById('offers-list').innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

function filterOffers() {
  const q = (document.getElementById('offers-search').value || '').toLowerCase().trim();
  if (!q) { renderOffers(allOffers); return; }
  const terms = q.split(/\s+/);
  const filtered = allOffers.filter(o => {
    const text = [
      o.productName, o.vendorSku, o.price, o.matchStatus, o.productUrl,
      ...(o.rawData?.tags || []),
      o.rawData?.vendor, o.rawData?.productType,
      ...(o.rawData?.categories || []),
      o.rawData?.description
    ].filter(Boolean).join(' ').toLowerCase();
    return terms.every(t => text.includes(t));
  });
  renderOffers(filtered);
}

function renderOffers(offers) {
  const el = document.getElementById('offers-list');
  if (!offers.length) {
    el.innerHTML = '<div class="card"><p style="color:var(--muted)">No offers found. Add a vendor source and run ingestion first.</p></div>';
    return;
  }
  el.innerHTML = `<p style="color:var(--muted);font-size:0.85rem;margin-bottom:0.75rem">${offers.length} offer(s)</p>` +
    `<table><thead><tr><th></th><th>Product</th><th>SKU</th><th>Price</th><th>Status</th><th>Actions</th></tr></thead><tbody>` +
    offers.map(o => `<tr id="offer-row-${o.id}">
      <td>${o.imageUrl ? `<img src="${esc(o.imageUrl)}" class="offers-img" loading="lazy">` : ''}</td>
      <td>
        <div style="font-weight:500">${esc(o.productName)}</div>
        ${o.productUrl ? `<a href="${esc(o.productUrl)}" target="_blank" style="color:var(--accent);font-size:0.75rem">View →</a>` : ''}
      </td>
      <td><code style="font-size:0.8rem">${esc(o.vendorSku)}</code></td>
      <td>${o.price ? '$' + esc(o.price) : '—'}</td>
      <td><span class="badge badge-${o.matchStatus || 'pending'}">${esc(o.matchStatus || 'pending')}</span></td>
      <td>
        ${o.matchStatus !== 'linked' ? `
          <div class="row" style="gap:0.3rem;flex-wrap:wrap">
            <input type="text" id="link-sku-${o.id}" placeholder="Catalog SKU" style="width:120px;font-size:0.8rem;padding:0.25rem 0.4rem">
            <button class="btn-primary btn-sm" onclick="linkOfferBySku('${o.id}')">Link</button>
            <button class="btn-ghost btn-sm" onclick="autoCreateFromOffer('${o.id}', this)" title="Create catalog part from this offer">Auto-Create</button>
          </div>
        ` : `<span style="color:var(--success);font-size:0.8rem">✓ Linked</span>`}
      </td>
    </tr>`).join('') + `</tbody></table>`;
}

async function linkOfferBySku(offerId) {
  const skuInput = document.getElementById(`link-sku-${offerId}`);
  const sku = skuInput.value.trim();
  if (!sku) return;

  // Find catalog part by SKU
  try {
    const searchRes = await apiFetch(`/api/admin/catalog/parts?baseSku=${encodeURIComponent(sku)}`);
    const searchData = await searchRes.json();
    const parts = searchData.parts || [];
    if (!parts.length) { alert(`No catalog part found with SKU "${sku}"`); return; }

    await apiFetch(`/api/admin/catalog/vendor-offers/${offerId}/link`, {
      method: 'PATCH',
      body: JSON.stringify({ catalogPartId: parts[0].id }),
    });
    await loadOffers();
  } catch (e) {
    alert(e.message);
  }
}

async function autoCreateFromOffer(offerId, btn) {
  const origText = btn.innerHTML;
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  try {
    // Get the offer's data from the row
    const row = document.getElementById(`offer-row-${offerId}`);
    const cells = row.querySelectorAll('td');
    const productName = cells[1].querySelector('div').textContent;
    const vendorSku = cells[2].querySelector('code').textContent;
    const imageUrl = cells[0].querySelector('img')?.src || '';

    // Create a catalog part from this offer
    const res = await apiFetch('/api/admin/catalog/parts', {
      method: 'POST',
      body: JSON.stringify({
        name: productName,
        baseSku: vendorSku,
        category: 'uncategorized',
        primaryImageUrl: imageUrl || undefined,
      }),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.message || d.error || 'Failed'); }
    const part = await res.json();

    // Link the offer to the new catalog part
    await apiFetch(`/api/admin/catalog/vendor-offers/${offerId}/link`, {
      method: 'PATCH',
      body: JSON.stringify({ catalogPartId: part.id }),
    });

    btn.innerHTML = '✅';
    setTimeout(() => loadOffers(), 1000);
  } catch (e) {
    btn.innerHTML = origText;
    btn.disabled = false;
    alert(e.message);
  }
}

function filterCatalogParts() {

function stripHtml(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  return d.textContent || d.innerText || '';
}

function escAttr(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function togglePartEdit(id) {
  const row = document.getElementById(`part-edit-${id}`);
  if (row) {
    const wasOpen = row.classList.contains('open');
    row.classList.toggle('open');
    if (!wasOpen) {
      loadPartImages(id);
      loadPartVariants(id);
    }
  }
}

function markPartDirty(id, field, value) {
  if (!dirtyParts[id]) dirtyParts[id] = {};
  dirtyParts[id][field] = value;
  updateSaveBar();
  // Update the dot indicator in the summary row
  const rows = document.querySelectorAll('.part-row');
  // re-render would lose editor state, just update count
}

function updateSaveBar() {
  const count = Object.keys(dirtyParts).length;
  const bar = document.getElementById('parts-save-bar');
  const countEl = document.getElementById('parts-dirty-count');
  if (count > 0) {
    bar.classList.remove('hidden');
    countEl.textContent = `${count} part(s) with unsaved changes`;
  } else {
    bar.classList.add('hidden');
  }
}

function discardPartChanges() {
  dirtyParts = {};
  updateSaveBar();
  filterCatalogParts();
}

async function saveAllDirtyParts() {
  const ids = Object.keys(dirtyParts);
  if (!ids.length) return;
  const bar = document.getElementById('parts-save-bar');
  const countEl = document.getElementById('parts-dirty-count');
  countEl.innerHTML = `<span class="spinner"></span> Saving ${ids.length} part(s)...`;

  let saved = 0, failed = 0;
  for (const id of ids) {
    try {
      const res = await apiFetch(`/api/admin/catalog/parts/${id}`, {
        method: 'PATCH',
        body: JSON.stringify(dirtyParts[id]),
      });
      if (!res.ok) throw new Error('save failed');
      saved++;
      // Update local data so re-render shows new values
      const part = allParts.find(p => p.id === id);
      if (part) Object.assign(part, dirtyParts[id]);
      delete dirtyParts[id];
    } catch (e) {
      failed++;
    }
  }

  updateSaveBar();
  filterCatalogParts();
  if (failed) {
    countEl.textContent = `Saved ${saved}, failed ${failed}`;
    bar.classList.remove('hidden');
    setTimeout(() => updateSaveBar(), 3000);
  }
}

async function loadPartImages(partId) {
  const container = document.getElementById(`part-images-${partId}`);
  if (!container) return;
  try {
    const res = await apiFetch(`/api/admin/catalog/parts/${partId}/images`);
    const data = await res.json();
    const images = data.images || [];
    if (!images.length) {
      container.innerHTML = '<span style="color:var(--muted);font-size:0.8rem">No images yet</span>';
      return;
    }
    container.innerHTML = images.map(img => {
      const filterText = img.variantFilter ? JSON.stringify(img.variantFilter) : 'all variants';
      return `<div style="position:relative;border:1px solid var(--border);border-radius:6px;overflow:hidden;width:100px">
        <img src="${API}/api/catalog/parts/${partId}/images/${img.id}" style="width:100px;height:100px;object-fit:cover" loading="lazy">
        <div style="font-size:0.65rem;padding:2px 4px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escAttr(filterText)}">${esc(filterText)}</div>
        <button onclick="event.stopPropagation();deletePartImage('${partId}','${img.id}')" style="position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:20px;height:20px;cursor:pointer;font-size:0.7rem;line-height:1" title="Delete">✕</button>
      </div>`;
    }).join('');
  } catch (e) {
    container.innerHTML = `<span style="color:red;font-size:0.8rem">${esc(e.message)}</span>`;
  }
}

async function uploadPartImages(partId, fileList) {
  if (!fileList || !fileList.length) return;
  const filterInput = document.getElementById(`img-filter-${partId}`);
  let variantFilter = null;
  if (filterInput && filterInput.value.trim()) {
    try { variantFilter = JSON.parse(filterInput.value.trim()); } catch { alert('Invalid JSON for variant filter'); return; }
  }

  for (const file of fileList) {
    const base64 = await fileToBase64(file);
    try {
      await apiFetch(`/api/admin/catalog/parts/${partId}/images`, {
        method: 'POST',
        body: JSON.stringify({
          imageBase64: base64,
          mimeType: file.type || 'image/jpeg',
          variantFilter,
        }),
      });
    } catch (e) {
      alert(`Failed to upload ${file.name}: ${e.message}`);
    }
  }
  // Clear inputs
  document.getElementById(`img-upload-${partId}`).value = '';
  if (filterInput) filterInput.value = '';
  loadPartImages(partId);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      // Strip "data:image/...;base64," prefix
      const result = reader.result;
      const idx = result.indexOf(',');
      resolve(idx >= 0 ? result.substring(idx + 1) : result);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function deletePartImage(partId, imageId) {
  if (!confirm('Delete this image?')) return;
  try {
    await apiFetch(`/api/admin/catalog/parts/${partId}/images/${imageId}`, { method: 'DELETE' });
    loadPartImages(partId);
  } catch (e) { alert(e.message); }
}

async function addVariant(partId) {
  const skuEl = document.getElementById(`var-sku-${partId}`);
  const labelEl = document.getElementById(`var-label-${partId}`);
  const attrsEl = document.getElementById(`var-attrs-${partId}`);
  const sku = skuEl.value.trim();
  const label = labelEl.value.trim();
  if (!sku || !label) { alert('SKU and label are required'); return; }

  let variantAttributes = {};
  if (attrsEl.value.trim()) {
    try { variantAttributes = JSON.parse(attrsEl.value.trim()); } catch { alert('Invalid JSON for attributes'); return; }
  }

  try {
    const res = await apiFetch(`/api/admin/catalog/parts/${partId}/variants`, {
      method: 'POST',
      body: JSON.stringify({ sku, label, variantAttributes }),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.message || d.error || 'Failed'); }
    skuEl.value = ''; labelEl.value = ''; attrsEl.value = '';
    loadPartVariants(partId);
  } catch (e) { alert(e.message); }
}

async function deleteVariant(partId, variantId) {
  if (!confirm('Delete this variant?')) return;
  try {
    await apiFetch(`/api/admin/catalog/parts/${partId}/variants/${variantId}`, { method: 'DELETE' });
    loadPartVariants(partId);
  } catch (e) { alert(e.message); }
}

async function createCatalogPart() {
  const name = document.getElementById('cp-name').value.trim();
  const brand = document.getElementById('cp-brand').value.trim();
  const category = document.getElementById('cp-category').value;
  const baseSku = document.getElementById('cp-sku').value.trim();
  const primaryImageUrl = document.getElementById('cp-image').value.trim();
  const instructionsPdfUrl = document.getElementById('cp-pdf').value.trim();
  const setupDisplayText = document.getElementById('cp-setup-text').value.trim();
  const descEl = document.getElementById('cp-desc');
  const description = descEl.innerHTML.trim();
  const tagsStr = document.getElementById('cp-tags').value.trim();
  const msgEl = document.getElementById('cp-msg');

  if (!name || !category || !baseSku) { msgEl.innerHTML = '<div class="error">Name, category, and SKU are required</div>'; return; }

  const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(Boolean) : [];

  try {
    const res = await apiFetch('/api/admin/catalog/parts', {
      method: 'POST',
      body: JSON.stringify({ name, brand: brand || undefined, category, baseSku, description: description || undefined, setupDisplayText: setupDisplayText || undefined, primaryImageUrl: primaryImageUrl || undefined, instructionsPdfUrl: instructionsPdfUrl || undefined, tags }),
    });
    if (!res.ok) { const d = await res.json(); throw new Error(d.message || d.error || 'Failed'); }
    ['cp-name','cp-brand','cp-sku','cp-tags'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('cp-category').value = '';
    ['cp-image','cp-pdf','cp-setup-text'].forEach(id => document.getElementById(id).value = '');
    descEl.innerHTML = '';
    msgEl.innerHTML = '<div class="success">Catalog part created!</div>';
    setTimeout(() => msgEl.innerHTML = '', 3000);
    await loadCatalogParts();
  } catch (e) {
    msgEl.innerHTML = `<div class="error">${esc(e.message)}</div>`;
  }
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── Init ──────────────────────────────────────────────────

(async function init() {
  if (AUTH_TOKEN) {
    try {
      const res = await apiFetch('/admin/api/users');
      if (res.ok) { showAdmin(); return; }
    } catch {}
    doLogout();
  }
})();
</script>
